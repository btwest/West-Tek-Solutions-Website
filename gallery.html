<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>West-Tek Solutions | Shop</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
      :root {
        --space-black: #1c1c1c;
        --pure-white: #ffffff;
        --spacex-orange: #ff6b35;
        --dark-gray: #1a1a1a;
        --medium-gray: #666666;
        --light-gray: #cccccc;
        --border-gray: #333333;
      }

      /* PAGE BANNER */
      .page-banner {
        position: relative;
        width: 100vw;
        height: 40vh;
        margin-left: calc(-50vw + 50%);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: flex-start;
        overflow: hidden;
        border-bottom: 1px solid var(--border-gray);
        background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 100%);
      }

      .page-banner::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(var(--border-gray) 1px, transparent 1px),
          linear-gradient(90deg, var(--border-gray) 1px, transparent 1px);
        background-size: 50px 50px;
        opacity: 0.18;
        z-index: 0;
      }

      .page-banner::after {
        content: '';
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 70%;
        background: linear-gradient(to top, rgba(28,28,28,0.97) 0%, transparent 100%);
        z-index: 1;
      }

      .page-banner-content {
        position: relative;
        z-index: 2;
        padding: 2.5rem 4rem;
        animation: fadeInUp 0.7s ease both;
      }

      .page-id-tag {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--spacex-orange);
        margin-bottom: 0.75rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .page-id-tag::before {
        content: '';
        display: inline-block;
        width: 24px;
        height: 2px;
        background: var(--spacex-orange);
      }

      .page-banner h1 {
        font-size: clamp(2.5rem, 5vw, 4rem);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 4px;
        color: var(--pure-white);
        line-height: 1;
        margin: 0;
        text-align: left;
        text-shadow: 2px 2px 12px rgba(0,0,0,0.8);
      }

      .page-banner h1 span { color: var(--spacex-orange); }

      /* MAIN */
      main {
        padding: 0 2rem 4rem;
        max-width: 1200px;
        margin: 0 auto;
      }

      /* COMING SOON */
      .coming-soon-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 6rem 2rem;
        border: 1px solid var(--border-gray);
        background-color: var(--dark-gray);
        margin-top: 3rem;
        position: relative;
        overflow: hidden;
      }

      /* subtle grid inside the panel */
      .coming-soon-panel::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(var(--border-gray) 1px, transparent 1px),
          linear-gradient(90deg, var(--border-gray) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.1;
      }

      .coming-soon-inner {
        position: relative;
        z-index: 1;
        max-width: 560px;
      }

      .coming-soon-tag {
        display: inline-block;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--spacex-orange);
        border: 1px solid var(--spacex-orange);
        padding: 0.3rem 0.85rem;
        margin-bottom: 1.75rem;
      }

      .coming-soon-panel h2 {
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: var(--pure-white);
        margin: 0 0 1rem;
        text-align: center;
      }

      .coming-soon-panel h2::after { display: none; }

      .coming-soon-panel p {
        font-size: 1rem;
        color: var(--light-gray);
        line-height: 1.8;
        margin: 0;
      }

      /* ANIMATIONS */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .coming-soon-panel { animation: fadeInUp 0.5s ease both; }

      /* RESPONSIVE */
      @media (max-width: 600px) {
        .page-banner-content { padding: 2rem; }
        .page-banner h1 { font-size: 2.2rem; }
        main { padding: 0 1rem 3rem; }
        .coming-soon-panel { padding: 4rem 1.5rem; }
      }
    </style>
  </head>
  <body>

    <header id="site-header"></header>
    <div class="overlay" id="overlay"></div>
    <div class="mobile-nav" id="mobileNav">
      <a href="/index.html">Home</a>
      <a href="/gallery.html">Shop</a>
      <a href="/about.html">About Us</a>
      <a href="/missionlog.html">Missions</a>
      <a href="/nvm2.html">NVM2</a>
    </div>
    <script src="/header.js"></script>


    <!-- Page Banner -->
    <div class="page-banner">
      <div class="page-banner-content">
        <div class="page-id-tag">West-Tek Solutions</div>
        <h1>The <span>Shop</span></h1>
      </div>
    </div>


    <main>
      <div class="coming-soon-panel">
        <div class="coming-soon-inner">
          <span class="coming-soon-tag">// Coming Soon</span>
          <h2>Under Construction</h2>
          <p>
            We're working on something exciting. Check back soon to explore exclusive
            <span class="highlight">WEST-TEK SOLUTIONS</span> merch and project kits.
          </p>
        </div>
      </div>
    </main>


    <footer id="site-footer"></footer>
    <script src="/footer.js"></script>

  </body>
</html>
